<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Browse Products — Inventory Management System</title>
  <link rel="stylesheet" href="../assets/inventory.css">
  <script type="module" src="../backend/api-bridge.js"></script>
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="sidebar__logo">Inventory</div>
      <ul class="sidebar__nav">
        <li><a href="customer-dashboard.html" class="active">Browse Products</a></li>
      </ul>
      <div class="sidebar__logout">
        <a href="log-in.html">Logout</a>
      </div>
    </aside>

    <main class="main">
      <header class="main__header">
        <h1 class="main__title">Browse Products</h1>
      </header>

      <div class="toolbar">
        <input type="text" id="search" class="toolbar__search" placeholder="Search product name..." autocomplete="off">
        <select id="category-filter" class="toolbar__select">
          <option value="">All Categories</option>
        </select>
        <select id="status-filter" class="toolbar__select">
          <option value="">All Status</option>
          <option value="ok">In Stock</option>
          <option value="low">Low Stock</option>
          <option value="out">Out of Stock</option>
        </select>
      </div>

      <div class="table-wrap">
        <table class="inventory-table">
          <thead>
            <tr>
              <th class="col-id">ID</th>
              <th>Product Name</th>
              <th>Category</th>
              <th class="col-price">Price</th>
              <th class="col-status">Status</th>
              <th class="col-actions">Actions</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var CATEGORIES = [];
      var products = [];

      function getCategoryName(cid) {
        var c = CATEGORIES.find(function (x) { return x.id === cid; });
        return c ? c.category_name : 'Uncategorized';
      }
      function getStockStatus(count, limit) {
        if (count === 0) { return 'out'; }
        if (count < limit) { return 'low'; }
        return 'ok';
      }
      function formatPrice(n) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n); }

      var searchEl = document.getElementById('search');
      var catEl = document.getElementById('category-filter');
      var statusEl = document.getElementById('status-filter');
      var tbody = document.getElementById('table-body');

      function escapeHtml(s) {
        if (!s) { return ''; }
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function render() {
        var search = searchEl.value.trim().toLowerCase();
        var cat = catEl.value;
        var status = statusEl.value;
        var list = products.filter(function (p) {
          var nameOk = !search || p.item_name.toLowerCase().indexOf(search) !== -1;
          var catOk = !cat || String(p.category_id) === cat;
          var st = getStockStatus(p.item_count, p.low_stock_limit);
          var statusOk = !status || st === status;
          return nameOk && catOk && statusOk;
        });

        if (list.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><p>No products match your filters.</p></td></tr>';
          return;
        }

        tbody.innerHTML = list.map(function (p) {
          var st = getStockStatus(p.item_count, p.low_stock_limit);
          var label = st === 'ok' ? 'In Stock' : st === 'low' ? 'Low Stock' : 'Out of Stock';
          return '<tr style="cursor: pointer;" onclick="window.location.href=\'product-page.html?id=' + p.id + '\';">' + '<td class="col-id">' + p.id + '</td>' + '<td>' + escapeHtml(p.item_name) + '</td>' + '<td>' + escapeHtml(getCategoryName(p.category_id)) + '</td>' + '<td class="col-price">' + formatPrice(p.price) + '</td>' + '<td class="col-status"><span class="stock-badge stock-badge--' + st + '">' + label + '</span></td>' + '<td class="col-actions"><a href="product-page.html?id=' + p.id + '" class="btn btn--primary" onclick="event.stopPropagation();">View</a></td>' + '</tr>';
        }).join('');
      }

      searchEl.oninput = render; catEl.onchange = render; statusEl.onchange = render;

      // Fetch from API
      function initData() {
        if (!window.INVENTORY_API) {
          setTimeout(initData, 50);
          return;
        }
        Promise.all([window.INVENTORY_API.loadProducts(), window.INVENTORY_API.loadCategories()])
          .then(function (res) {
            products = res[0] || [];
            CATEGORIES = res[1] || [];
            
            CATEGORIES.forEach(function (c) {
              var opt = document.createElement('option');
              opt.value = c.id; opt.textContent = c.category_name;
              catEl.appendChild(opt);
            });
            render();
          });
      }
      initData();
    });
  </script>
</body>
</html>
