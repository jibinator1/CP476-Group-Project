<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome - Inventory Management System</title>
  <link rel="stylesheet" href="../assets/inventory.css">
  <script src="../backend/supabaseConfig.js"></script>
  <!-- Optional: add supabaseConfig.js (copy from backend/supabaseConfig.example.js) to use Supabase backend -->
  <script type="module" src="../backend/api-bridge.js"></script>
  <style>
    body.login-page {
      background: radial-gradient(circle at top left, #1e293b, #0f172a);
      overflow: hidden;
    }
    .login-container {
      perspective: 1000px;
      width: 100%;
      max-width: 440px;
    }
    .login-card {
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      position: relative;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
    }
    .login-card__title {
      color: white;
      letter-spacing: -0.02em;
    }
    .login-card__subtitle {
      color: rgba(255, 255, 255, 0.6);
    }
    .form-group label {
      color: rgba(255, 255, 255, 0.8);
    }
    .form-group input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
    }
    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    .form-group input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--color-primary);
    }
    .toggle-text {
      text-align: center;
      margin-top: var(--space-lg);
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
    }
    .toggle-link {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      margin-left: 0.25rem;
    }
    .toggle-link:hover {
      text-decoration: underline;
    }
    #signup-form-wrap {
      display: none;
    }
    .login-card.is-signup #login-form-wrap { display: none; }
    .login-card.is-signup #signup-form-wrap { display: block; }

    /* Decorative blobs */
    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--color-primary);
      filter: blur(80px);
      border-radius: 50%;
      z-index: -1;
      opacity: 0.15;
      animation: float 20s infinite alternate;
    }
    .blob--1 { top: -100px; left: -100px; background: #0d9488; }
    .blob--2 { bottom: -100px; right: -100px; background: #3b82f6; animation-delay: -5s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 100px) scale(1.1); }
    }
  </style>
</head>
<body class="login-page">
  <div class="blob blob--1"></div>
  <div class="blob blob--2"></div>

  <div class="login-container">
    <div class="login-card" id="auth-card">
      <h1 class="login-card__title">Inventory System</h1>
      
      <!-- Login View -->
      <div id="login-form-wrap">
        <p class="login-card__subtitle">Welcome back! Please enter your details. <br>DONT USE REAL EMAIL/PASS!<br>If you dont want to create a new account, use email: manager@gmail.com<br>password: password</p>
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <div class="login-card__actions">
            <button type="submit" class="btn btn--primary">Sign In</button>
            <p class="login-card__divider">or</p>
            <a href="customer-dashboard.html" class="btn btn--ghost" style="color: white; border-color: rgba(255,255,255,0.2)">Browse as Customer</a>
          </div>
        </form>
        <p class="toggle-text">Don't have an account?<a class="toggle-link" id="go-to-signup">Sign up</a></p>
      </div>

      <!-- Signup View -->
      <div id="signup-form-wrap">
        <p class="login-card__subtitle">Create an account to get started.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="••••••••" required minlength="6">
          </div>
          <div class="login-card__actions">
            <button type="submit" class="btn btn--primary">Create Account</button>
          </div>
        </form>
        <p class="toggle-text">Already have an account?<a class="toggle-link" id="go-to-login">Log In</a></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { signInUser, signUpUser } from '../backend/inventoryService.js';

    const card = document.getElementById('auth-card');
    const goToSignup = document.getElementById('go-to-signup');
    const goToLogin = document.getElementById('go-to-login');

    goToSignup.addEventListener('click', () => { card.classList.add('is-signup'); });
    goToLogin.addEventListener('click', () => { card.classList.remove('is-signup'); });

    //handle Forms
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-password').value;
      
      const { data, error } = await signInUser(email, pass);
      
      if (error) {
        alert('Wrong password or email');
        return;
      }

      // Success animation then redirect
      card.style.transform = 'scale(0.95)'; card.style.opacity = '0.5';
      setTimeout(() => { window.location.href = 'inventory.html'; }, 300);
    });

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const pass = document.getElementById('signup-password').value;

      const { data, error } = await signUpUser(email, pass, name);

      if (error) {
        alert('Signup failed: ' + error);
        return;
      }

      alert('Account created successfully! Please sign in.');
      card.classList.remove('is-signup');
    });
  </script>


</body>
</html>
